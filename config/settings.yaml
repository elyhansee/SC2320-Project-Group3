# Central configuration for the Spatial-Behavioural Analytics pipeline.
# Mapping Nutritional Vulnerability and Food Accessibility in Singapore's
# Aging Districts. All paths are interpreted relative to the project root.

project:
  name: elderly_food_vulnerability
  random_seed: 42
  locale: en_GB

paths:
  data_raw: data/raw
  data_interim: data/interim
  data_processed: data/processed
  outputs_root: outputs
  outputs_figures: outputs/figures
  outputs_tables: outputs/tables
  outputs_models: outputs/models
  outputs_logs: outputs/logs

# Raw filenames. Files marked optional may be absent and the pipeline will
# log a warning rather than fail.
raw_files:
  subzone_boundary: subzone_boundary.geojson
  population_csv: ResidentPopulationbyPlanningAreaSubzoneofResidenceAgeGroupandSexCensusofPopulation2020.csv
  hawker_centres: HawkerCentresGEOJSON.geojson
  supermarkets: SupermarketsGEOJSON.geojson
  markets: NEAMarketandFoodCentre.geojson
  bus_stops: LTABusStop.geojson
  mrt_exits: LTAMRTStationExitGEOJSON.geojson
  friendly_buildings: FriendlyBuildings.geojson
  land_use: MasterPlan2025LandUseLayer.geojson
  senior_centres: SeniorActivityCentresAndActiveAgeingCentresAnnual.csv
  od_bus_csv: od_bus.csv
  od_train_csv: od_train.csv

# Coordinate reference systems.
crs:
  geographic: EPSG:4326
  projected: EPSG:3414

# Feature engineering parameters.
features:
  population:
    elderly_age_columns:
      - Total_65_69
      - Total_70_74
      - Total_75_79
      - Total_80_84
      - Total_85_89
      - Total_90andOver
    total_column: Total_Total
    name_column: Number

  food_access:
    hawker_status_column: STATUS
    hawker_status_accept:
      - "Existing"
      - "Existing (new)"
      - "Existing (replacement)"
    market_status_column: STATUS
    buffer_km: 1.0

  transit:
    bus_buffer_km: 0.5
    mrt_buffer_km: 0.8

  accessibility:
    friendly_buffer_km: 0.5
    senior_centre_buffer_km: 1.0

  land_use:
    residential_keywords:
      - RESIDENTIAL
      - RESIDENTIAL WITH COMMERCIAL AT 1ST STOREY
      - COMMERCIAL & RESIDENTIAL
      - RESIDENTIAL / INSTITUTION
    min_residential_area_m2: 5000
    min_residential_share: 0.05

  od:
    enable: false
    chunksize: 500000

# Binary thresholds for the Apriori amenity matrix.
binary_thresholds:
  high_elderly_share_q: 0.66
  high_elderly_density_q: 0.66
  poor_food_access_q: 0.66
  poor_transit_q: 0.66
  rich_food_q: 0.66
  rich_transit_q: 0.66
  rich_accessibility_q: 0.66
  poor_accessibility_q: 0.66
  hawker_present_min: 1
  supermarket_present_min: 1
  market_present_min: 1
  diverse_food_min_types: 2

mining:
  apriori_min_support: 0.05
  apriori_min_confidence: 0.5
  apriori_min_lift: 1.1
  apriori_max_len: 4
  support_sweep: [0.03, 0.05, 0.08, 0.10, 0.15]

clustering:
  feature_columns:
    - elderly_pct
    - elderly_density_log
    - nearest_hawker_km
    - nearest_supermarket_km
    - nearest_market_km
    - food_amenity_count_log
    - food_amenity_diversity
    - transit_access_score
    - accessibility_support_score
  k_range: [2, 3, 4, 5, 6, 7, 8]
  algorithms: ["kmeans", "agglomerative", "dbscan"]
  kmeans_n_init: 25
  dbscan_min_samples_list: [4, 6, 8]
  final_algorithm: kmeans
  final_k: null

risk_model:
  components:
    - feature: elderly_pct
      direction: positive
      weight: 1.0
      reason: "Higher elderly share concentrates vulnerability."
    - feature: elderly_density_log
      direction: positive
      weight: 0.5
      reason: "Density of elderly residents per km2 amplifies local need."
    - feature: nearest_food_km
      direction: positive
      weight: 1.0
      reason: "Greater walking distance to the nearest affordable food source."
    - feature: food_access_score
      direction: negative
      weight: 1.0
      reason: "Composite of nearby hawker / supermarket / market counts."
    - feature: transit_access_score
      direction: negative
      weight: 0.75
      reason: "Bus and MRT access reduces effort needed to reach food."
    - feature: accessibility_support_score
      direction: negative
      weight: 0.5
      reason: "Barrier-free buildings and senior centres support frail elders."
  high_risk_quantile: 0.75
  test_size: 0.25
  rf_n_estimators: 400
  rf_max_depth: null
  rf_min_samples_leaf: 2
  cv_folds: 5

interpretation:
  hotspot_top_n: 20

logging:
  level: INFO
  logfile: outputs/logs/pipeline.log